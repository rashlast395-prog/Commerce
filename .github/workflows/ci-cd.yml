name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            server/package-lock.json
            sarab/package-lock.json
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: python-service/requirements.txt
      
      - name: Lint Frontend
        run: |
          cd sarab
          npm ci
          npm run typecheck
      
      - name: Lint Backend
        run: |
          cd server
          npm ci
          npm run typecheck
      
      - name: Lint Python
        run: |
          cd python-service
          pip install -r requirements.txt
          python -m py_compile app/main.py
          python -m py_compile app/services/*.py
          python -m py_compile app/routers/*.py

  security-scan:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
      
      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

  build:
    needs: lint-and-test
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Build Frontend
        run: |
          cd sarab
          npm ci
          npm run build
      
      - name: Build Backend
        run: |
          cd server
          npm ci
          npm run build
      
      - name: Build Docker images
        run: |
          docker build -t richys-eat-frontend ./sarab
          docker build -t richys-eat-api ./server
          docker build -t richys-eat-python ./python-service

  deploy-staging:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to staging
        run: echo "Deploy to staging environment"

  deploy-production:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to production
        run: echo "Deploy to production environment"
