<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Richy's Eat - Offline</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: #fff8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        .offline-box {
            max-width: 400px;
            padding: 40px;
        }
        .offline-icon {
            font-size: 4rem;
            color: #e8281a;
            margin-bottom: 20px;
        }
        h1 {
            font-family: 'Playfair Display', serif;
            color: #1a1a1a;
            margin-bottom: 10px;
        }
        p {
            color: #666;
            line-height: 1.6;
        }
        .btn-red {
            display: inline-block;
            margin-top: 20px;
            padding: 14px 32px;
            background: linear-gradient(135deg, #e8281a, #c01e12);
            color: #fff;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            box-shadow: 0 8px 24px rgba(232, 40, 26, 0.35);
        }
        .btn-red:hover {
            transform: translateY(-2px);
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="offline-box">
        <div class="offline-icon"><i class="fas fa-wifi-slash"></i></div>
        <h1>You're Offline</h1>
        <p>It looks like you've lost your internet connection. Please check your network and try again.</p>
        <a href="./index.html" class="btn-red">Try Again</a>
    </div>
</body>
</html>
