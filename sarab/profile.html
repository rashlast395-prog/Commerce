<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Richy's Eat - My Profile</title>
    <link rel="manifest" href="../sarab/manifest.json"/>
    <meta name="theme-color" content="#e8281a"/>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
    <meta name="apple-mobile-web-app-title" content="Richy's Eat"/>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="../sarab/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="../sarab/css/all.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="../sarab/css/style.css"/>
    <style>
        .profile-wrap { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
        .profile-card { background: #fff; border-radius: 18px; padding: 32px; box-shadow: var(--shadow); border: 1px solid #f0e6dd; }
        .profile-avatar { width: 100px; height: 100px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--secondary)); display: flex; align-items: center; justify-content: center; font-size: 2.5rem; color: #fff; margin: 0 auto 20px; }
        .profile-header { text-align: center; margin-bottom: 32px; }
        .profile-header h2 { margin: 0 0 8px; font-family: "Playfair Display", serif; }
        .profile-header p { margin: 0; color: #888; }
        .profile-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .profile-field { margin-bottom: 20px; }
        .profile-field label { display: block; margin-bottom: 8px; font-weight: 600; color: #555; font-size: .85rem; }
        .profile-field input, .profile-field select, .profile-field textarea { width: 100%; padding: 12px 16px; border: 1px solid #f0e6dd; border-radius: 12px; font-size: .9rem; font-family: inherit; transition: border-color .2s; }
        .profile-field input:focus, .profile-field select:focus, .profile-field textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(232,40,26,.08); }
        .profile-field.full { grid-column: 1 / -1; }
        .profile-actions { display: flex; gap: 12px; margin-top: 24px; }
        .profile-actions .btn { flex: 1; padding: 14px; border-radius: 12px; font-weight: 600; }
        .btn-primary-custom { background: linear-gradient(135deg, var(--primary), #c01e12); color: #fff; border: none; }
        .btn-primary-custom:hover { color: #fff; transform: translateY(-2px); }
        .btn-outline-custom { background: transparent; border: 1px solid #f0e6dd; color: #555; }
        .btn-outline-custom:hover { background: var(--cream); color: var(--primary); }
        @media (max-width: 575px) { .profile-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="profile-wrap">
        <div class="profile-card">
            <div class="profile-header">
                <div class="profile-avatar"><i class="fas fa-user"></i></div>
                <h2>My Profile</h2>
                <p>Manage your personal information</p>
            </div>
            <form id="profileForm">
                <div class="profile-grid">
                    <div class="profile-field">
                        <label>Full Name *</label>
                        <input type="text" id="profName" required/>
                    </div>
                    <div class="profile-field">
                        <label>Email Address *</label>
                        <input type="email" id="profEmail" required/>
                    </div>
                    <div class="profile-field">
                        <label>Phone Number</label>
                        <input type="tel" id="profPhone"/>
                    </div>
                    <div class="profile-field">
                        <label>Date of Birth</label>
                        <input type="date" id="profDob"/>
                    </div>
                    <div class="profile-field">
                        <label>Age</label>
                        <input type="number" id="profAge" min="0" max="120"/>
                    </div>
                    <div class="profile-field">
                        <label>Gender</label>
                        <select id="profGender">
                            <option value="">Select Gender</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                            <option value="other">Other</option>
                            <option value="prefer-not-to-say">Prefer not to say</option>
                        </select>
                    </div>
                    <div class="profile-field full">
                        <label>Address</label>
                        <textarea id="profAddress" rows="2"></textarea>
                    </div>
                </div>
                <div class="profile-actions">
                    <button type="submit" class="btn btn-primary-custom"><i class="fas fa-save me-1"></i>Save Changes</button>
                    <button type="button" class="btn btn-outline-custom" id="profCancel">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <div id="toastContainer"></div>

    <script type="module" src="profile.js"></script>
</body>
</html>
