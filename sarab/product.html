<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Richy's Eat - Product Detail</title>
    <link rel="manifest" href="../sarab/manifest.json"/>
    <meta name="theme-color" content="#e8281a"/>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
    <meta name="apple-mobile-web-app-title" content="Richy's Eat"/>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="../sarab/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="../sarab/css/all.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="../sarab/css/style.css"/>
    <style>
        .product-detail-wrap { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }
        .product-detail-card { background: #fff; border-radius: 18px; overflow: hidden; box-shadow: var(--shadow); border: 1px solid #f0e6dd; }
        .product-detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0; }
        .product-detail-img { background: var(--cream); display: flex; align-items: center; justify-content: center; min-height: 400px; }
        .product-detail-img img { width: 100%; height: 100%; object-fit: cover; }
        .product-detail-body { padding: 32px; }
        .product-detail-body .pcat { color: var(--primary); font-weight: 600; font-size: .8rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .product-detail-body h1 { font-family: "Playfair Display", serif; font-size: 2rem; font-weight: 900; margin: 0 0 12px; }
        .product-detail-body .prating { color: #f39c12; margin-bottom: 16px; }
        .product-detail-body .prating span { color: #bbb; font-size: .85rem; margin-left: 6px; }
        .product-detail-body .pdesc { color: #666; line-height: 1.7; margin-bottom: 20px; }
        .product-detail-body .pprice { font-size: 2rem; font-weight: 900; color: var(--primary); margin-bottom: 20px; }
        .product-detail-body .pprice small { color: #ccc; text-decoration: line-through; font-size: 1.2rem; margin-left: 10px; font-weight: 400; }
        .product-detail-body .pmeta { display: flex; gap: 20px; margin-bottom: 24px; flex-wrap: wrap; }
        .product-detail-body .pmeta-item { display: flex; align-items: center; gap: 6px; color: #888; font-size: .85rem; }
        .product-detail-body .pmeta-item i { color: var(--primary); }
        .opt-group { margin-bottom: 20px; }
        .opt-group label { display: block; font-weight: 600; margin-bottom: 10px; color: #444; font-size: .9rem; }
        .opt-btns { display: flex; gap: 8px; flex-wrap: wrap; }
        .opt-btn { padding: 10px 18px; border: 1px solid #f0e6dd; border-radius: 10px; background: #fff; cursor: pointer; font-family: inherit; font-size: .85rem; transition: all .2s; }
        .opt-btn:hover { border-color: var(--primary); color: var(--primary); }
        .opt-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
        .opt-btn.ex { position: relative; }
        .opt-btn.ex .ex-price { font-size: .75rem; color: #888; margin-left: 4px; }
        .opt-btn.ex.active .ex-price { color: rgba(255,255,255,.8); }
        .qty-row { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }
        .qty-row label { font-weight: 600; color: #444; }
        .qty-control { display: flex; align-items: center; gap: 0; border: 1px solid #f0e6dd; border-radius: 10px; overflow: hidden; }
        .qty-control button { width: 40px; height: 40px; border: none; background: #fff; cursor: pointer; font-size: 1.1rem; transition: all .2s; }
        .qty-control button:hover { background: var(--cream); }
        .qty-control span { width: 50px; text-align: center; font-weight: 600; line-height: 40px; }
        .tags-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
        .tag { padding: 6px 14px; background: var(--cream); border-radius: 20px; font-size: .8rem; color: #666; }
        .tag.hot { background: rgba(232,40,26,.1); color: var(--primary); }
        .add-cart-btn { width: 100%; padding: 16px; border: none; border-radius: 12px; background: linear-gradient(135deg, var(--primary), #c01e12); color: #fff; font-size: 1rem; font-weight: 700; cursor: pointer; transition: all .2s; font-family: inherit; }
        .add-cart-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 22px rgba(232,40,26,.4); color: #fff; }
        .back-link { display: inline-flex; align-items: center; gap: 8px; color: #888; text-decoration: none; margin-bottom: 20px; font-size: .9rem; transition: color .2s; }
        .back-link:hover { color: var(--primary); }
        @media (max-width: 767px) { .product-detail-grid { grid-template-columns: 1fr; } .product-detail-img { min-height: 250px; } }
    </style>
</head>
<body>
    <div class="product-detail-wrap">
        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i>Back to Menu</a>
        <div class="product-detail-card">
            <div class="product-detail-grid">
                <div class="product-detail-img">
                    <img id="pImg" src="" alt=""/>
                </div>
                <div class="product-detail-body">
                    <div class="pcat" id="pCat"></div>
                    <h1 id="pTitle"></h1>
                    <div class="prating" id="pStars"></div>
                    <div class="pdesc" id="pDesc"></div>
                    <div class="pprice" id="pPrice"></div>
                    <div class="pmeta" id="pMeta"></div>
                    <div class="tags-row" id="pTags"></div>

                    <div class="opt-group">
                        <label>Size</label>
                        <div class="opt-btns" id="pSize">
                            <button class="opt-btn active" data-v="Regular" data-p="0">Regular</button>
                            <button class="opt-btn" data-v="Large" data-p="3">Large +$3</button>
                            <button class="opt-btn" data-v="X-Large" data-p="5">X-Large +$5</button>
                        </div>
                    </div>
                    <div class="opt-group">
                        <label>Spice Level</label>
                        <div class="opt-btns" id="pSpice">
                            <button class="opt-btn active" data-v="Mild">Mild</button>
                            <button class="opt-btn" data-v="Medium">Medium</button>
                            <button class="opt-btn hot" data-v="Hot">Hot</button>
                            <button class="opt-btn fire" data-v="Extra Hot">Extra Hot</button>
                        </div>
                    </div>
                    <div class="opt-group">
                        <label>Extras</label>
                        <div class="opt-btns" id="pExtras">
                            <button class="opt-btn ex" data-v="Extra Cheese" data-p="2">Extra Cheese +$2</button>
                            <button class="opt-btn ex" data-v="Bacon" data-p="2.5">Bacon +$2.50</button>
                            <button class="opt-btn ex" data-v="Avocado" data-p="1.5">Avocado +$1.50</button>
                            <button class="opt-btn ex" data-v="Jalapeños" data-p="1">Jalapeños +$1</button>
                        </div>
                    </div>

                    <div class="qty-row">
                        <label>Quantity:</label>
                        <div class="qty-control">
                            <button id="pMinus">-</button>
                            <span id="pQty">1</span>
                            <button id="pPlus">+</button>
                        </div>
                        <span style="color:#aaa;font-size:.85rem;">portion(s)</span>
                    </div>

                    <button class="add-cart-btn" id="pAddCart"><i class="fas fa-shopping-cart me-1"></i>Add to Cart</button>
                </div>
            </div>
        </div>
    </div>

    <div id="toastContainer"></div>

    <script type="module" src="product.js"></script>
</body>
</html>
